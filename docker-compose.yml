services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: partytime
      POSTGRES_PASSWORD: partytime
      POSTGRES_DB: partytime
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partytime"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://partytime:partytime@db:5432/partytime
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
